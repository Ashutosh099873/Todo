<!DOCTYPE html>
<html>
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Todo App</title>

    <link rel="stylesheet" href="todo.css" />

    <script src="todo.js" defer></script>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

  </head>

  <body>

    <div class="todos-bg-container">

      <div class="container">

        <div class="row">

          <div class="col-12">

            <h1 class="todos-heading">Todos</h1>

            <h1 class="create-task-heading">
              Create
              <span class="create-task-heading-subpart">Task</span>
            </h1>

            <input
              type="text"
              id="todoUserInput"
              class="todo-user-input"
            />

            <button class="add-todo-button btn btn-primary p-2 m-2">
              Add
            </button>

            <button class="save-todo-button btn btn-primary p-2 m-2">
              SAVE
            </button>

            <h1 class="todo-items-heading">
              My
              <span class="todo-items-heading-subpart">Tasks</span>
            </h1>

            <ul
              class="todo-items-container"
              id="todoItemsContainer"
            ></ul>

          </div>

        </div>

      </div>

    </div>

  </body>
</html>
